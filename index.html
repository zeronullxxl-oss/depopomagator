<script>
const h=(t,a,...c)=>{const e=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='className')e.className=v;else if(k==='innerHTML')e.innerHTML=v;else e.setAttribute(k,v)});c.flat(5).forEach(x=>{if(x!=null)e.append(typeof x==='string'||typeof x==='number'?String(x):x)});return e};
let TOKEN=localStorage.getItem('dp_token')||'';

function fmtD(ms){const s=Math.floor(ms/1000);return s<60?s+'s':Math.floor(s/60)+'m '+(s%60)+'s';}
function stat(l,v,s,cl){return h('div',{className:'stat'},h('div',{className:'lbl',style:{marginBottom:'6px',color:cl||'#6b7280'}},l),h('div',{className:'big',style:{color:'#f3f4f6'}},String(v)),s?h('div',{className:'sub'},s):null);}
function loader(){return h('div',{className:'f ac jc',style:{padding:'80px'}},h('div',{className:'sp'}));}
function bisect(a,t){let lo=0,hi=a.length;while(lo<hi){const m=(lo+hi)>>>1;if(a[m].t<=t)lo=m+1;else hi=m;}return lo;}

// Build HTML for iframe — strip scripts, disable interaction, keep styles/images
function buildFrameHtml(domHtml){
  var html=domHtml;
  // Remove scripts, CSP headers, tracking
  html=html.replace(/<script[\s\S]*?<\/script>/gi,'');
  // Remove Content-Security-Policy meta (blocks resources in iframe)
  html=html.replace(/<meta[^>]*content-security-policy[^>]*>/gi,'');
  // Remove event handlers from tags
  html=html.replace(/\s(on\w+)="[^"]*"/gi,'');
  // Inject CSS to disable interaction + base tag fallback
  const inject='<style>*{pointer-events:none!important;user-select:none!important;cursor:default!important}a{color:inherit!important}body{margin:0!important}</style>';
  if(html.includes('</head>'))html=html.replace('</head>',inject+'</head>');
  else if(html.includes('<body'))html=html.replace('<body',inject+'<body');
  else html=inject+html;
  return html;
}

// Render a page frame: iframe with real DOM or fallback wireframe
function pageFrame(domData, width, height, id){
  const wrap=h('div',{className:'page-frame',id:id||'',style:{width:width+'px',height:height+'px',position:'relative'}});
  if(domData&&domData.html){
    const iframe=document.createElement('iframe');
    iframe.style.cssText='width:'+width+'px;height:'+height+'px;border:none;pointer-events:none;display:block;background:#fff';
    // Use blob URL — no sandbox needed, scripts already stripped
    const blob=new Blob([buildFrameHtml(domData.html)],{type:'text/html;charset=utf-8'});
    iframe.src=URL.createObjectURL(blob);
    wrap.append(iframe);
    // Scale to fit after load
    iframe.onload=function(){
      try{
        const realW=domData.docWidth||1440;
        const scale=width/realW;
        const doc=iframe.contentDocument;
        if(doc&&doc.documentElement){
          doc.documentElement.style.transform='scale('+scale+')';
          doc.documentElement.style.transformOrigin='top left';
          doc.documentElement.style.width=realW+'px';
          doc.documentElement.style.overflow='hidden';
        }
      }catch(e){console.log('Frame scale error:',e);}
    };
  } else {
    // Fallback wireframe
    const pg=h('div',{className:'fake-page'});
    pg.append(h('div',{style:{height:'120px',background:'rgba(0,0,0,.05)'}}));
    pg.append(h('div',{style:{height:'36px',background:'rgba(99,102,241,.08)'}}));
    const r=h('div',{className:'f g2',style:{marginBottom:'10px'}});[1,2,3].forEach(()=>r.append(h('div',{style:{flex:'1',height:'70px',background:'rgba(0,0,0,.03)',borderRadius:'6px'}})));
    pg.append(r);pg.append(h('div',{style:{height:'90px',background:'rgba(0,0,0,.03)'}}));
    wrap.style.background='#f3f4f6';wrap.append(pg);
  }
  return wrap;
}

  a.append(h('div',{className:'f ac jc',style:{minHeight:'100vh'}},h('div',{style:{width:'100%',maxWidth:'420px',padding:'32px'}},
    h('div',{className:'f ac g3',style:{marginBottom:'32px'}},h('div',{style:{width:'44px',height:'44px',borderRadius:'12px',background:'linear-gradient(135deg,#6366f1,#a855f7)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px'}},'\u{1F525}'),h('div',null,h('h1',{style:{fontSize:'22px',fontWeight:'800'}},'DepositoPomogator'),h('div',{style:{fontSize:'11px',color:'#4b5563'}},'\u0410\u043D\u0430\u043B\u0438\u0442\u0438\u043A\u0430 \u041B\u0435\u043D\u0434\u043E\u0432'))),
    h('div',{className:'card',style:{padding:'24px'}},h('div',{className:'lbl',style:{marginBottom:'6px'}},'API Token'),h('input',{id:'tk',className:'inp',type:'password',placeholder:'DP_API_TOKEN',value:TOKEN,style:{marginBottom:'20px'}}),err?h('div',{style:{fontSize:'12px',color:'#f87171',marginBottom:'12px',padding:'8px 12px',background:'rgba(239,68,68,.08)',borderRadius:'8px'}},err):null,h('button',{className:'btn bp',style:{width:'100%',padding:'12px 0',fontSize:'14px',justifyContent:'center'},onClick:doLogin},'Connect'))
  )));
}
async function doLogin(){TOKEN=document.getElementById('tk').value.trim();if(!TOKEN)return;try{const d=await api('/api/health');if(d.status==='ok'){localStorage.setItem('dp_token',TOKEN);offersScreen();}else loginScreen('Bad response');}catch(e){loginScreen(e.message);}}

// ==================== OFFERS ====================
let sortMode='sessions';
async function offersScreen(){
  const a=document.getElementById('app');a.innerHTML='';a.append(loader());
  try{
    const[st,od]=await Promise.all([api('/api/stats?hours=168'),api('/api/offers?hours=168')]);
    const offers=od.offers||[];a.innerHTML='';
    a.append(h('div',{className:'hdr'},h('div',{className:'f ac jb'},h('div',{className:'f ac g3'},h('div',{style:{width:'36px',height:'36px',borderRadius:'10px',background:'linear-gradient(135deg,#6366f1,#a855f7)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px'}},'\u{1F525}'),h('div',null,h('h1',{style:{fontSize:'20px',fontWeight:'800'}},'DepositoPomogator'),h('span',{style:{fontSize:'10px',color:'#4b5563',letterSpacing:'.08em',textTransform:'uppercase'}},'\u0410\u043D\u0430\u043B\u0438\u0442\u0438\u043A\u0430 \u041B\u0435\u043D\u0434\u043E\u0432'))),h('div',{className:'f ac g2'},h('button',{className:'btn bg',onClick:offersScreen},'\u21BB'),h('div',{style:{fontSize:'10px',color:'#22c55e'},className:'f ac g2'},h('span',{style:{width:'6px',height:'6px',borderRadius:'50%',background:'#22c55e',display:'inline-block'}}),'LIVE'),h('button',{className:'btn bg',onClick:()=>{localStorage.removeItem('dp_token');TOKEN='';loginScreen();}},'Exit')))));
    const cn=h('div',{style:{maxWidth:'920px',margin:'0 auto',padding:'28px 20px'}});a.append(cn);
    cn.append(h('div',{className:'f g3 w',style:{marginBottom:'20px'}},stat('Sessions',(st.totalSessions||0).toLocaleString(),'7 days'),stat('CR',(st.conversionRate||0)+'%',st.conversions+' conv'),stat('Rage',st.rageClickSessions||0,'Frustrated')));
    const sr=h('div',{className:'f ac jb w g2',style:{marginBottom:'16px'}});sr.append(h('h2',{style:{fontSize:'16px',fontWeight:'700'}},offers.length?offers.length+' Offers':'No data yet'));
    const sb=h('div',{className:'f g2'});['sessions','cr','rage'].forEach(s=>{sb.append(h('button',{className:'sb'+(sortMode===s?' on':''),onClick:()=>{sortMode=s;offersScreen();}},s==='sessions'?'Sessions':s==='cr'?'CR%':'Rage'));});sr.append(sb);cn.append(sr);
    if(!offers.length){cn.append(h('div',{style:{textAlign:'center',padding:'60px 20px',color:'#4b5563'}},h('div',{style:{fontSize:'32px',marginBottom:'12px'}},'\u{1F4E1}'),h('div',{style:{fontSize:'14px'}},'Waiting for data...'),h('div',{style:{fontSize:'12px',color:'#374151',marginTop:'8px'}},'Add tracker to landing pages.')));return;}
    const sorted=[...offers].sort((a,b)=>sortMode==='cr'?b.conversionRate-a.conversionRate:sortMode==='rage'?b.rageClickSessions-a.rageClickSessions:b.totalSessions-a.totalSessions);
    const list=h('div',{className:'f c g3'});
    sorted.forEach(o=>{const slug=o.url.split('/').filter(Boolean).pop();const rp=o.totalSessions>0?(o.rageClickSessions/o.totalSessions*100).toFixed(1):'0';const bad=o.conversionRate<4||parseFloat(rp)>15,good=o.conversionRate>5.5&&parseFloat(rp)<10;
      const cd=h('div',{className:'oc',style:{border:'1px solid '+(bad?'rgba(239,68,68,.12)':good?'rgba(34,197,94,.12)':'rgba(255,255,255,.05)'),borderLeft:'4px solid '+(bad?'#ef4444':good?'#22c55e':'#6366f1')},onClick:()=>detailScreen(o)});
      cd.append(h('div',{className:'f ac jb',style:{marginBottom:'12px'}},h('div',null,h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'2px'}},o.title||slug),h('div',{className:'m',style:{fontSize:'10px',color:'#4b5563'}},o.url.replace('https://',''))),h('span',{style:{color:'#4b5563'}},'>')));
      const mt=h('div',{className:'f g5 w'});[['Sessions',o.totalSessions,'#e5e7eb'],['CR',o.conversionRate+'%',o.conversionRate>=5?'#4ade80':o.conversionRate>=4?'#fbbf24':'#f87171'],['Time',o.avgDuration+'s','#e5e7eb'],['Scroll',o.avgScrollDepth+'%',o.avgScrollDepth>=65?'#4ade80':'#fbbf24'],['Rage',o.rageClickSessions,parseFloat(rp)>12?'#f87171':'#e5e7eb'],['Conv',o.conversions,'#818cf8']].forEach(([l,v,c])=>{mt.append(h('div',null,h('div',{style:{fontSize:'10px',color:'#6b7280',marginBottom:'2px'}},l),h('div',{className:'m',style:{fontSize:'18px',fontWeight:'700',color:c}},String(v))));});
      cd.append(mt);list.append(cd);});cn.append(list);
  }catch(e){a.innerHTML='';a.append(h('div',{style:{padding:'40px',color:'#f87171'}},'Error: '+e.message,h('br'),h('button',{className:'btn bg',style:{marginTop:'12px'},onClick:offersScreen},'Retry')));}
}

// ==================== DETAIL ====================
async function detailScreen(offer){
  const a=document.getElementById('app');a.innerHTML='';a.append(loader());
  const u=encodeURIComponent(offer.url);
  try{
    const[el,fm,hm,ss]=await Promise.all([api('/api/elements?url='+u+'&hours=168'),api('/api/forms?url='+u+'&hours=168'),api('/api/heatmap?url='+u+'&hours=168'),api('/api/sessions?url='+u+'&hours=168&per_page=50')]);
    // Try to get DOM snapshot
    let domData=null;
    try{domData=await api('/api/dom?url='+u);}catch(e){}
    showDetail(offer,el,fm,hm,ss,domData);
  }catch(e){a.innerHTML='';a.append(h('div',{style:{padding:'40px',color:'#f87171'}},'Error: '+e.message,h('br'),h('button',{className:'btn bg',style:{marginTop:'12px'},onClick:()=>detailScreen(offer)},'Retry')));}
}

function showDetail(offer,elData,formData,heatData,sessData,domData){
  const a=document.getElementById('app');a.innerHTML='';const slug=offer.url.split('/').filter(Boolean).pop();
  a.append(h('div',{className:'hdr'},h('div',{className:'f ac g4'},h('button',{className:'btn bg',onClick:offersScreen},'\u2190 All'),h('div',null,h('div',{style:{fontSize:'16px',fontWeight:'700'}},offer.title||slug),h('div',{className:'m',style:{fontSize:'10px',color:'#4b5563'}},offer.url.replace('https://',''))),h('button',{className:'btn bg',style:{marginLeft:'auto'},onClick:()=>detailScreen(offer)},'\u21BB'))));

  function setTab(id){tbar.innerHTML='';['overview','heatmap','replay','elements','forms'].forEach(t=>{tbar.append(h('button',{className:'tab'+(id===t?' on':''),onClick:()=>setTab(t)},{overview:'Overview',heatmap:'Heatmap',replay:'Replay',elements:'Elements',forms:'Form Funnel'}[t]));});cnt.innerHTML='';
    if(id==='overview')tabOverview(cnt,offer,elData);
    else if(id==='heatmap')tabHeatmap(cnt,heatData,domData);
    else if(id==='replay')tabReplay(cnt,sessData,domData);

// === OVERVIEW ===
function tabOverview(cnt,offer,elData){
  cnt.append(h('div',{className:'f g3 w',style:{marginBottom:'20px'}},stat('Sessions',offer.totalSessions,'7d'),stat('CR',offer.conversionRate+'%',offer.conversions+' conv'),stat('Time',offer.avgDuration+'s'),stat('Scroll',offer.avgScrollDepth+'%'),stat('Rage',offer.rageClickSessions)));
  if(offer.devices){const d=h('div',{className:'card',style:{marginBottom:'16px'}});d.append(h('div',{className:'lbl',style:{marginBottom:'12px'}},'Devices'));Object.entries(offer.devices).forEach(([k,v])=>{const p=offer.totalSessions>0?(v/offer.totalSessions*100).toFixed(0):0;d.append(h('div',{className:'f ac g2',style:{marginBottom:'6px'}},h('span',{style:{fontSize:'14px'}},k==='mobile'?'\u{1F4F1}':'\u{1F5A5}\u{FE0F}'),h('span',{style:{fontSize:'12px',flex:'1',textTransform:'capitalize'}},k),h('span',{className:'m',style:{fontSize:'12px',fontWeight:'600',color:'#9ca3af'}},p+'%')));});cnt.append(d);}

// === HEATMAP with real page ===
function tabHeatmap(cnt,heatData,domData){
  const clicks=heatData.clicks||[];let opacity=0.7;
  const W=700,H=500;
  const ctrl=h('div',{className:'f ac jb w g3',style:{marginBottom:'16px'}});
  ctrl.append(h('h2',{style:{fontSize:'15px',fontWeight:'600'}},'Click Heatmap'+(domData?' (real page)':'')));
  const right=h('div',{className:'f ac g3'});right.append(h('span',{style:{fontSize:'10px',color:'#6b7280'}},'Opacity'));
  const slider=h('input',{type:'range',min:'0.2',max:'1',step:'0.1',value:'0.7',style:{width:'80px'},onInput:e=>{opacity=parseFloat(e.target.value);drawHeat();}});
  right.append(slider);ctrl.append(right);cnt.append(ctrl);

  const frame=pageFrame(domData,W,H,'hm-frame');
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:5';
  frame.append(canvas);
  frame.append(h('div',{className:'m',style:{position:'absolute',bottom:'10px',right:'10px',fontSize:'10px',color:'#fff',background:'rgba(0,0,0,.7)',padding:'3px 8px',borderRadius:'4px',zIndex:'10'}},clicks.length+' clicks \u00B7 '+(heatData.totalSessions||0)+' sessions'));
  cnt.append(frame);

  function drawHeat(){
    const dpr=window.devicePixelRatio||1;
    // Scale clicks to frame size
    const realW=domData?.docWidth||1440;
    const realH=domData?.docHeight||3000;
    const sx=W/realW,sy=H/realH;
    canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
    const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
    clicks.forEach(({x,y})=>{
      const cx=x*sx,cy=y*sy;
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,25);g.addColorStop(0,'rgba(255,0,0,.2)');g.addColorStop(.5,'rgba(255,165,0,.1)');g.addColorStop(1,'rgba(255,255,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,25,0,Math.PI*2);ctx.fill();
    });
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);const d=img.data;
    for(let i=0;i<d.length;i+=4){const a=d[i+3];if(a>0){const n=a/255;if(n>.6){d[i]=255;d[i+1]=0;d[i+2]=0;}else if(n>.4){d[i]=255;d[i+1]=100;d[i+2]=0;}else if(n>.2){d[i]=255;d[i+1]=200;d[i+2]=0;}else{d[i]=0;d[i+1]=100;d[i+2]=255;}d[i+3]=Math.min(255,a*3*opacity);}}
    ctx.putImageData(img,0,0);
  }
  setTimeout(drawHeat,100);

  // Scroll depth

async function loadReplay(sessInfo,container,domData){
  container.innerHTML='';container.append(h('div',{className:'lbl',style:{marginBottom:'10px'}},'Session '+sessInfo.sid.slice(-8)));
  container.append(h('div',{className:'f ac jc',style:{padding:'40px'}},h('div',{className:'sp'})));
  try{
    const data=await api('/api/sessions/'+sessInfo.sid);

    const sessDom=data.dom&&data.dom.html?data.dom:domData;
    container.innerHTML='';container.append(h('div',{className:'lbl',style:{marginBottom:'10px'}},'Session '+sessInfo.sid.slice(-8)));
    buildPlayer(container,data,sessDom);
    const info=h('div',{className:'f g2 w',style:{marginTop:'12px'}});
    [sessInfo.device+' \u00B7 '+(sessInfo.ref||'direct'),sessInfo.clicks+' clicks'+(sessInfo.rageClicks?' \u00B7 '+sessInfo.rageClicks+' rage':''),'scroll: '+sessInfo.maxScroll+'%',sessInfo.converted?'CONVERTED':'NO CONV'].forEach(t=>info.append(h('span',{className:'m',style:{fontSize:'10px',color:'#6b7280',background:'rgba(255,255,255,.03)',padding:'4px 8px',borderRadius:'5px',border:'1px solid rgba(255,255,255,.05)'}},t)));
    container.append(info);
  }catch(e){container.innerHTML='<div style="padding:20px;color:#f87171">Error: '+e.message+'</div>';}

function buildPlayer(container,data,domData){
  const events=data.events||[];const duration=data.duration||25000;
  const moves=events.filter(e=>e.type==='move');const scrolls=events.filter(e=>e.type==='scroll');const clicks=events.filter(e=>e.type==='click'||e.type==='rage_click');
  if(!moves.length&&!clicks.length){container.append(h('div',{style:{padding:'40px',textAlign:'center',color:'#4b5563'}},'No replay data'));return;}

  const W=720,H=400;
  const realW=domData?.docWidth||data.viewport?.w||1440;
  const realH=domData?.docHeight||5000;
  const scaleX=W/realW;

  const frame=pageFrame(domData,W,H);
  // Overlay for cursor, trail, clicks
  const overlay=document.createElementNS('http://www.w3.org/2000/svg','svg');
  overlay.setAttribute('style','position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15');
  const trail=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  trail.setAttribute('fill','none');trail.setAttribute('stroke','rgba(99,102,241,0.5)');trail.setAttribute('stroke-width','2');trail.setAttribute('stroke-linecap','round');
  overlay.append(trail);frame.append(overlay);
  const cursor=h('div',{className:'cursor-dot'});frame.append(cursor);
  const timeBadge=h('div',{className:'time-badge'},'0.0s');frame.append(timeBadge);
  container.append(frame);

  let playing=false,ct=0,speed=1,startTs=null,frameId=null;
  const trailPts=[];let scrollY=0;

  const playBtn=h('button',{className:'btn bp',onClick:togglePlay},'\u25B6 Play');
  const progWrap=h('div',{style:{flex:'1',height:'5px',background:'rgba(255,255,255,.08)',borderRadius:'3px',cursor:'pointer'},onClick:e=>{const r=e.currentTarget.getBoundingClientRect();ct=(e.clientX-r.left)/r.width*duration;update();}});
  const progBar=h('div',{style:{width:'0%',height:'100%',background:'linear-gradient(90deg,#6366f1,#a855f7)',borderRadius:'3px'}});progWrap.append(progBar);
  const speedBtns=h('div',{className:'f g2'});[1,2,4].forEach(s=>{speedBtns.append(h('button',{className:'sb'+(speed===s?' on':''),onClick:()=>{speed=s;speedBtns.querySelectorAll('.sb').forEach((b,i)=>b.className='sb'+([1,2,4][i]===s?' on':''));}},s+'x'));});
  container.append(h('div',{className:'f ac g3',style:{marginTop:'12px'}},playBtn,progWrap,speedBtns));

  function togglePlay(){if(playing){playing=false;cancelAnimationFrame(frameId);playBtn.innerHTML='\u25B6 Play';}else{if(ct>=duration){ct=0;trailPts.length=0;}playing=true;startTs=null;playBtn.innerHTML='\u23F8 Pause';frameId=requestAnimationFrame(animate);}}
  function animate(ts){if(!startTs)startTs=ts;ct=Math.min((ts-startTs)*speed,duration);update();if(ct>=duration){playing=false;playBtn.innerHTML='\u25B6 Replay';return;}frameId=requestAnimationFrame(animate);}

  function update(){
    const mi=bisect(moves,ct)-1;let cx=W/2,cy=H/2;
    if(mi>=0){cx=moves[mi].x*scaleX;cy=moves[mi].y*scaleX;trailPts.push(cx+','+cy);}
    if(trailPts.length>50)trailPts.splice(0,trailPts.length-50);
    trail.setAttribute('points',trailPts.join(' '));
    const si=bisect(scrolls,ct)-1;if(si>=0)scrollY=scrolls[si].y;
    // Scroll the iframe content
    const iframe=frame.querySelector('iframe');
    if(iframe&&iframe.contentWindow){try{iframe.contentWindow.scrollTo(0,scrollY);}catch(e){}}
    // If fake page, move it
    const fakePg=frame.querySelector('.fake-page');
    if(fakePg)fakePg.style.marginTop=(-scrollY*scaleX)+'px';

    const viewCy=cy-scrollY*scaleX;
    cursor.style.left=(cx-6)+'px';cursor.style.top=(viewCy-6)+'px';
    // Ripples
    frame.querySelectorAll('.click-ring').forEach(r=>r.remove());
    const ce=bisect(clicks,ct),cs=bisect(clicks,ct-500);
    for(let i=cs;i<ce;i++){const c=clicks[i];const rage=c.type==='rage_click';frame.append(h('div',{className:'click-ring',style:{left:(c.x*scaleX-14)+'px',top:((c.y-scrollY)*scaleX-14)+'px',border:'2px solid '+(rage?'#ef4444':'#6366f1'),background:rage?'rgba(239,68,68,.25)':'rgba(99,102,241,.2)'}}));}
    progBar.style.width=(ct/duration*100)+'%';
    timeBadge.textContent=(ct/1000).toFixed(1)+'s / '+(duration/1000).toFixed(1)+'s';
  }
}

      ic.append(h('div',{style:{fontSize:'12px',color:'#d1d5db',lineHeight:'1.7',marginBottom:'6px',paddingLeft:'12px',borderLeft:'2px solid rgba(239,68,68,.2)'}},h('strong',{className:'m',style:{color:'#f87171'}},e.selector),h('span',{style:{color:'#6b7280'}},' \u2014 '+e.rageClicks+'/'+e.clicks+' ('+(e.clicks>0?(e.rageClicks/e.clicks*100).toFixed(0):0)+'%)'),h('br'),h('span',{style:{color:'#9ca3af'}},tip)));});cnt.append(ic);}
